<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Contact Our OTT Experts and Sales Team | StreamPlay</title>
   <meta name="description" content="Get in touch with the StreamPlay sales team. Fill out the form and book a meeting at your convenience.">
   <meta name="theme-color" content="#491275">
   <link rel="icon" href="assets/images/streamplay-icon.png" type="image/png">
   <link rel="stylesheet" href="https://use.typekit.net/nuo5dim.css">
   <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

   <header class="contact-header">
      <a href="index.html" class="logo-link" aria-label="StreamPlay home">
         <img width="280" height="54" src="assets/images/streamplay-logo-transparent.png" alt="StreamPlay">
      </a>
   </header>

   <main class="contact-page">
      <div class="contact-intro">
         <h1>Contact Our OTT Experts and Sales Team</h1>
         <p>Fill out the form and book a meeting at your convenience. Your input is highly valued!</p>
      </div>

      <div class="form-card" id="formCard">
         <form class="sp-form" id="contactForm" novalidate>
            <div class="form-row">
               <div class="form-field">
                  <label for="firstName">First Name <span class="required">*</span></label>
                  <input type="text" id="firstName" name="firstName" placeholder="Enter first name" required>
               </div>
               <div class="form-field">
                  <label for="lastName">Last Name <span class="required">*</span></label>
                  <input type="text" id="lastName" name="lastName" placeholder="Enter last name" required>
               </div>
            </div>

            <div class="form-row">
               <div class="form-field">
                  <label for="email">Email <span class="required">*</span></label>
                  <input type="email" id="email" name="email" placeholder="Enter your email" required>
               </div>
               <div class="form-field">
                  <label for="phone">Phone Number <span class="required">*</span></label>
                  <div class="phone-group">
                     <select id="countryCode" name="countryCode" aria-label="Country code">
                        <option value="+1" selected>US +1</option>
                        <option value="+44">UK +44</option>
                        <option value="+91">IN +91</option>
                        <option value="+61">AU +61</option>
                        <option value="+971">AE +971</option>
                        <option value="+65">SG +65</option>
                        <option value="+49">DE +49</option>
                        <option value="+33">FR +33</option>
                        <option value="+81">JP +81</option>
                        <option value="+86">CN +86</option>
                        <option value="+27">ZA +27</option>
                        <option value="+55">BR +55</option>
                        <option value="+966">SA +966</option>
                     </select>
                     <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required>
                  </div>
               </div>
            </div>

            <div class="form-field">
               <label for="message">Message <span class="required">*</span></label>
               <textarea id="message" name="message" placeholder="Enter your query" required></textarea>
            </div>

            <div class="form-footer">
               <label class="terms">
                  <input type="checkbox" id="agree" name="agree" required>
                  <span>I agree with <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a></span>
               </label>
               <button type="submit" class="send-btn">Send</button>
            </div>
         </form>

         <div class="success-msg" id="successMsg">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
               <circle cx="32" cy="32" r="30" fill="#491275" stroke="#7c2dd6" stroke-width="2"/>
               <path d="M20 33L28 41L44 24" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h3>Thanks — message sent.</h3>
            <p>Our team will reach out shortly to schedule your meeting.</p>
         </div>
      </div>
   </main>

   <script>
      (function(){
         var form = document.getElementById('contactForm');
         var card = document.getElementById('formCard');
         var success = document.getElementById('successMsg');
         var submitBtn = form.querySelector('.send-btn');

         form.addEventListener('submit', function(e){
            e.preventDefault();
            
            // Basic native validation pass-through
            if (!form.checkValidity()){
               form.reportValidity();
               return;
            }

            // Disable submit button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            // Collect form data
            var formData = new FormData();
            formData.append('firstName', document.getElementById('firstName').value);
            formData.append('lastName', document.getElementById('lastName').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('countryCode', document.getElementById('countryCode').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('message', document.getElementById('message').value);

            // Send to PHP backend
            fetch('send-email.php', {
               method: 'POST',
               body: formData
            })
            .then(function(response) {
               return response.json();
            })
            .then(function(data) {
               if (data.success) {
                  card.classList.add('submitted');
                  success.classList.add('show');
                  window.scrollTo({top:0, behavior:'smooth'});
                  form.reset();
               } else {
                  alert('Failed to send message: ' + data.message);
                  submitBtn.disabled = false;
                  submitBtn.textContent = 'Send';
               }
            })
            .catch(function(error) {
               console.error('Error:', error);
               alert('An error occurred. Please try again later.');
               submitBtn.disabled = false;
               submitBtn.textContent = 'Send';
            });
         });
      })();
   </script>
</body>
</html>
